<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Tools Hub - 加密工具聚合平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .tool-card {
            transition: all 0.3s ease;
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .category-badge {
            transition: all 0.2s ease;
        }
        
        .category-badge:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="gradient-bg text-white">
        <nav class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    <span class="text-2xl font-bold">Crypto Tools Hub</span>
                </div>
                <div class="hidden md:flex space-x-6">
                    <a href="#tools" class="hover:text-gray-200">工具</a>
                    <a href="#categories" class="hover:text-gray-200">分类</a>
                    <a href="#about" class="hover:text-gray-200">关于</a>
                </div>
            </div>
        </nav>
        
        <!-- Hero Section -->
        <div class="container mx-auto px-6 py-20 text-center">
            <h1 class="text-5xl font-bold mb-6">加密工具聚合平台</h1>
            <p class="text-xl mb-8 text-gray-100">精选优质加密货币工具，助力您的 Web3 之旅</p>
            <div class="flex justify-center space-x-4">
                <a href="#tools" class="bg-white text-purple-600 px-8 py-3 rounded-lg font-semibold hover:bg-gray-100 transition">
                    浏览工具
                </a>
                <a href="#submit" class="border-2 border-white px-8 py-3 rounded-lg font-semibold hover:bg-white hover:text-purple-600 transition">
                    提交工具
                </a>
            </div>
        </div>
    </header>

    <!-- Categories -->
    <section id="categories" class="container mx-auto px-6 py-16">
        <h2 class="text-3xl font-bold text-center mb-12">工具分类</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="category-badge bg-white p-6 rounded-xl shadow-md text-center cursor-pointer" onclick="filterTools('privacy')">
                <div class="text-4xl mb-3">🎭</div>
                <h3 class="font-semibold">隐私工具</h3>
                <p class="text-sm text-gray-500 mt-2">混币器、隐私钱包</p>
            </div>
            <div class="category-badge bg-white p-6 rounded-xl shadow-md text-center cursor-pointer" onclick="filterTools('defi')">
                <div class="text-4xl mb-3">💰</div>
                <h3 class="font-semibold">DeFi 工具</h3>
                <p class="text-sm text-gray-500 mt-2">交易、流动性</p>
            </div>
            <div class="category-badge bg-white p-6 rounded-xl shadow-md text-center cursor-pointer" onclick="filterTools('analytics')">
                <div class="text-4xl mb-3">📊</div>
                <h3 class="font-semibold">数据分析</h3>
                <p class="text-sm text-gray-500 mt-2">链上数据、图表</p>
            </div>
            <div class="category-badge bg-white p-6 rounded-xl shadow-md text-center cursor-pointer" onclick="filterTools('wallet')">
                <div class="text-4xl mb-3">🔐</div>
                <h3 class="font-semibold">钱包工具</h3>
                <p class="text-sm text-gray-500 mt-2">HD 钱包、管理</p>
            </div>
        </div>
    </section>

    <!-- Tools Grid -->
    <section id="tools" class="container mx-auto px-6 py-16 bg-white">
        <h2 class="text-3xl font-bold text-center mb-12">精选工具</h2>
        
        <!-- Search Bar -->
        <div class="max-w-2xl mx-auto mb-12">
            <input type="text" id="searchInput" placeholder="搜索工具..." 
                   class="w-full px-6 py-4 rounded-lg border-2 border-gray-200 focus:border-purple-500 focus:outline-none"
                   onkeyup="searchTools()">
        </div>

        <!-- Tools Grid -->
        <div id="toolsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Tools will be inserted here by JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-12">
        <div class="container mx-auto px-6 text-center">
            <p class="text-gray-400">© 2026 Crypto Tools Hub. All rights reserved.</p>
            <div class="mt-4 space-x-4">
                <a href="#" class="text-gray-400 hover:text-white">GitHub</a>
                <a href="#" class="text-gray-400 hover:text-white">Twitter</a>
                <a href="#" class="text-gray-400 hover:text-white">Discord</a>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
